<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>センチメント・デスク（プレビュー）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0c10; --panel:#11151c; --panel2:#151b24; --line:#222b38;
  --text:#e7edf4; --dim:#8492a3; --bull:#2ec27e; --bear:#f2615a;
  --neutral:#8492a3; --gold:#d9a441;
}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  background-image:radial-gradient(1200px 600px at 80% -10%,#141b27 0,transparent 60%),
    radial-gradient(900px 500px at -10% 110%,#11161f 0,transparent 55%);}
.wrap{max-width:1180px;margin:0 auto;padding:28px 22px 60px}
header{display:flex;align-items:flex-end;justify-content:space-between;
  gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:26px}
h1{font-family:'Fraunces',serif;font-weight:500;font-size:34px;letter-spacing:.3px;margin:0;font-style:italic}
h1 .dot{color:var(--gold)}
.meta{font-size:12.5px;color:var(--dim);text-align:right;line-height:1.7}
.meta b{color:var(--text);font-weight:600}
.controls{display:flex;gap:10px;align-items:center;margin-top:8px}
.controls input{background:var(--panel2);border:1px solid var(--line);color:var(--text);
  font-family:inherit;padding:6px 10px;width:84px;border-radius:7px;font-size:13px}
.controls button{background:var(--gold);border:0;color:#1a1206;font-family:inherit;
  font-weight:600;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:13px}
.pill{font-size:10.5px;letter-spacing:.12em;color:#1a1206;background:var(--gold);
  padding:2px 8px;border-radius:999px;font-weight:600;vertical-align:middle;margin-left:10px}
.section-label{font-size:11px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;margin:0 0 12px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px}
.card{background:linear-gradient(180deg,var(--panel) 0,var(--panel2) 100%);
  border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;position:relative;overflow:hidden;
  opacity:0;transform:translateY(10px);animation:rise .5s ease forwards}
.card:nth-child(2){animation-delay:.07s}.card:nth-child(3){animation-delay:.14s}
@keyframes rise{to{opacity:1;transform:none}}
.card .win{font-size:12px;color:var(--dim);letter-spacing:.1em}
.card .val{font-family:'Fraunces',serif;font-style:italic;font-size:31px;line-height:1.1;
  margin:6px 0 2px;font-weight:500;white-space:nowrap}
/* 方向つき段階メーター（中央=中立、右=強気緑 / 左=弱気赤）*/
.meter{display:flex;align-items:center;gap:5px;margin:15px 0 14px}
.seg{flex:1;height:9px;border-radius:3px;background:#1d2531;transition:background .35s}
.seg.bull{background:var(--bull)} .seg.bear{background:var(--bear)}
.mid{flex:0 0 auto;width:2px;height:18px;background:#3a4757;border-radius:2px}
.kv{display:flex;justify-content:space-between;font-size:12.5px;color:var(--dim);margin-top:7px}
.kv b{color:var(--text);font-weight:600}
.chartbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 18px 8px;
  opacity:0;animation:rise .5s ease .2s forwards}
.src{font-size:11px;color:var(--dim);margin:10px 2px 0}
.pstats{display:flex;gap:24px;flex-wrap:wrap;margin:2px 2px 16px}
.pstat{font-size:12px;color:var(--dim);letter-spacing:.04em}
.pstat b{display:block;font-family:'Fraunces',serif;font-style:italic;font-size:22px;
  color:var(--text);font-weight:500;margin-top:3px}
@media(max-width:760px){.cards{grid-template-columns:1fr}h1{font-size:27px}}
</style></head>
<body><div class="wrap">
<header>
  <div>
    <h1>Sentiment Desk<span class="dot">.</span><span class="pill" id="mode">PREVIEW</span></h1>
    <div class="controls">
      <input id="asset" value="BTC" spellcheck="false">
      <button onclick="refresh()">更新</button>
    </div>
  </div>
  <div class="meta">
    <div>銘柄 <b id="m-asset">—</b> ・ 更新 <b id="m-upd">—</b></div>
    <div>収集 <b id="m-news">0</b> 件 / 採点 <b id="m-scored">0</b> 件</div>
  </div>
</header>

<p class="section-label">現在の集計シグナル</p>
<div class="cards" id="cards"></div>

<p class="section-label">センチメント推移 × 価格</p>
<div class="chartbox"><canvas id="chart" height="118"></canvas>
  <div class="src" id="src"></div></div>

<p class="section-label">ペーパー成績（フォワード検証）</p>
<div class="chartbox">
  <div class="pstats" id="paper-stats"></div>
  <canvas id="pchart" height="118"></canvas>
  <div class="src" id="psrc"></div>
  <div class="src" id="paper-empty" style="display:none"></div>
</div>

<p class="section-label">取引コントロール</p>
<div class="chartbox">
  <div style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;justify-content:space-between">
    <div>状態: <b id="ctl-state" style="font-size:1.1em">—</b> <span class="src" id="ctl-upd"></span></div>
    <div style="display:flex;gap:8px">
      <button id="ctl-run" onclick="setControl('running')">稼働</button>
      <button id="ctl-pause" onclick="setControl('paused')">一時停止</button>
      <button id="ctl-flat" onclick="setControl('flat')" style="border-color:var(--bear)">全手仕舞い</button>
    </div>
  </div>
  <div class="src" id="ctl-note" style="margin-top:8px"></div>
</div>
</div>

<script>
const css=k=>getComputedStyle(document.documentElement).getPropertyValue(k).trim();
const BULL=css('--bull'),BEAR=css('--bear'),NEU=css('--neutral'),GOLD=css('--gold'),DIM=css('--dim');
let chart, pchart;

/* イベント種別 → 日本語ラベル */
const EV={
  regulation:'規制', etf_or_fund_flow:'ETF・資金流入', hack_or_exploit:'ハッキング・流出',
  listing_or_delisting:'上場・廃止', partnership_or_adoption:'提携・採用',
  macro_or_rates:'マクロ・金利', whale_or_onchain:'大口・オンチェーン',
  tech_or_upgrade:'技術・更新', legal_or_lawsuit:'訴訟・法的',
  price_move_recap:'値動き解説', opinion_or_analysis:'分析・意見', other:'その他', '—':'—'
};
const evLabel=c=>EV[c]||c;

/* スコア(-1..1) → 段階レベル(-3..+3)・言葉・色（すべて level 起点で一貫）*/
function level(v){ return Math.max(-3, Math.min(3, Math.round(v/0.2))); }
function strengthWord(v){
  const L=level(v); if(L===0) return '中立';
  const dir = v>0 ? '強気' : '弱気';
  const a=Math.abs(L);
  return (a===1?'やや':a===3?'非常に':'')+dir;
}
function col(v){ const L=level(v); return L>0?BULL : L<0?BEAR : NEU; }
function fmt(v){ return (v>0?'+':'')+v.toFixed(2); }

function meterCells(v){
  const L=level(v); let html='';
  for(let i=-3;i<=3;i++){
    if(i===0){ html+='<span class="mid"></span>'; continue; }
    let cls='seg';
    if(i>0 && L>=i) cls+=' bull';
    if(i<0 && L<=i) cls+=' bear';
    html+=`<span class="${cls}"></span>`;
  }
  return html;
}

/* ---- サンプルデータ（サーバー/データが無いときのプレビュー用）---- */
function sampleSignal(asset){
  return {asset:asset||'BTC', updated:new Date().toISOString().slice(0,19)+' UTC',
    totals:{news:1284, scored:1251},
    windows:[
      {w:3, count:7,  mean:0.45, wmean:0.42, pos:5, neg:1, top_event:'etf_or_fund_flow'},
      {w:6, count:14, mean:0.21, wmean:0.18, pos:8, neg:4, top_event:'regulation'},
      {w:24,count:53, mean:-0.04,wmean:-0.06,pos:19,neg:22,top_event:'macro_or_rates'},
    ]};
}
function sampleSeries(window){
  const t=[],price=[],sent=[],count=[]; let p=62200, s=0.05;
  const start=Date.now()-48*3600*1000;
  for(let i=0;i<48;i++){
    const d=new Date(start+i*3600*1000);
    p*= (1+(Math.sin(i/5)*0.004)+(Math.random()-0.5)*0.006);
    s = Math.max(-0.7, Math.min(0.7, s*0.7 + Math.sin(i/6)*0.18 + (Math.random()-0.5)*0.12));
    t.push(d.toISOString()); price.push(Math.round(p)); sent.push(+s.toFixed(3));
    count.push(Math.max(0,Math.round(4+Math.sin(i/4)*3+(Math.random()-0.5)*3)));
  }
  return {source:'sample', window, t, price, sentiment:sent, count};
}

function renderCards(d){
  document.getElementById('m-asset').textContent=d.asset;
  document.getElementById('m-upd').textContent=(d.updated||'').replace('T',' ').replace('+00:00',' UTC');
  document.getElementById('m-news').textContent=d.totals.news;
  document.getElementById('m-scored').textContent=d.totals.scored;
  const box=document.getElementById('cards'); box.innerHTML='';
  d.windows.forEach(w=>{
    const c=col(w.wmean);
    const el=document.createElement('div'); el.className='card';
    el.innerHTML=`
      <div class="win">直近 ${w.w}h</div>
      <div class="val" style="color:${c}">${strengthWord(w.wmean)}</div>
      <div class="meter">${meterCells(w.wmean)}</div>
      <div class="kv"><span>強気 / 弱気の本数</span><b><span style="color:${BULL}">${w.pos}</span> / <span style="color:${BEAR}">${w.neg}</span></b></div>
      <div class="kv"><span>主な材料</span><b>${evLabel(w.top_event)}</b></div>
      <div class="kv"><span>件数 ・ スコア</span><b>${w.count} ・ ${fmt(w.wmean)}</b></div>`;
    box.appendChild(el);
  });
}

function renderChart(d){
  const labelMap={features:'price: features.csv', sample:'サンプルデータ（プレビュー）', db:'価格データなし'};
  document.getElementById('src').textContent=(labelMap[d.source]||d.source)+` ／ sentiment: sent_mean_${d.window}h`;
  const labels=d.t.map(x=>x.replace('T',' ').slice(5,16));
  const hasPrice=d.price.some(v=>v!==null);
  const ds=[{label:`市場心理 ${d.window}h`,data:d.sentiment,yAxisID:'y1',
      borderColor:GOLD,backgroundColor:GOLD,borderWidth:1.6,pointRadius:0,tension:.25}];
  if(hasPrice) ds.unshift({label:'price',data:d.price,yAxisID:'y',
      borderColor:'#5b6b7d',borderWidth:1.6,pointRadius:0,tension:.15});
  const opts={responsive:true,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:DIM,font:{family:'IBM Plex Mono'}}}},
    scales:{
      x:{ticks:{color:DIM,maxTicksLimit:8,font:{family:'IBM Plex Mono',size:10}},grid:{color:'#1a2230'}},
      y:{position:'left',display:hasPrice,ticks:{color:'#6f7e8f',font:{family:'IBM Plex Mono',size:10}},grid:{color:'#161d29'}},
      y1:{position:'right',min:-1,max:1,ticks:{color:GOLD,font:{family:'IBM Plex Mono',size:10}},grid:{drawOnChartArea:false}}
    }};
  if(chart){chart.data={labels,datasets:ds};chart.options=opts;chart.update();}
  else chart=new Chart(document.getElementById('chart'),{type:'line',data:{labels,datasets:ds},options:opts});
}

/* ---- ペーパー成績（フォワード検証）---- */
function samplePaper(){
  const t=[],eq=[],price=[]; let e=10000,p=62000;
  const start=Date.now()-72*3600*1000;
  for(let i=0;i<72;i++){const d=new Date(start+i*3600*1000);
    p*=(1+Math.sin(i/7)*0.004+(Math.random()-0.5)*0.005);
    e*=(1+Math.sin(i/8)*0.002+(Math.random()-0.5)*0.003+0.0006);
    t.push(d.toISOString()); eq.push(Math.round(e)); price.push(Math.round(p));}
  const last=eq[eq.length-1];
  return {t,equity:eq,price,position:eq.map(()=>0),realized:[],
    start_equity:10000,last_equity:last,
    ret_pct:+(((last/10000)-1)*100).toFixed(2),
    realized_pnl:+(last-10000).toFixed(2),position_qty:0,trades:18};
}

function renderPaper(p){
  const box=document.getElementById('paper-stats');
  const empty=document.getElementById('paper-empty');
  const canvas=document.getElementById('pchart');
  if(!p || !p.t || p.t.length===0){
    box.innerHTML=''; canvas.style.display='none';
    document.getElementById('psrc').textContent='';
    empty.style.display='block';
    empty.textContent='まだ取引記録がありません。採点(API)を有効にすると、シグナルに応じた仮想売買が記録され、ここに資産曲線が出ます。';
    if(pchart){pchart.destroy();pchart=null;}
    return;
  }
  empty.style.display='none'; canvas.style.display='';
  const ret=(p.ret_pct==null)?'—':((p.ret_pct>0?'+':'')+p.ret_pct+'%');
  const retc=p.ret_pct>0?BULL:p.ret_pct<0?BEAR:DIM;
  const rl=p.realized_pnl;
  box.innerHTML=`
    <div class="pstat">評価額<b>${p.last_equity!=null?p.last_equity.toLocaleString():'—'}</b></div>
    <div class="pstat">リターン<b style="color:${retc}">${ret}</b></div>
    <div class="pstat">実現損益<b>${rl!=null?((rl>0?'+':'')+rl.toLocaleString()):'—'}</b></div>
    <div class="pstat">現在建玉<b>${p.position_qty!=null?p.position_qty:'—'}</b></div>
    <div class="pstat">取引数<b>${p.trades}</b></div>`;
  document.getElementById('psrc').textContent='評価額（クォート建て） × price';
  const labels=p.t.map(x=>x.replace('T',' ').slice(5,16));
  const hasPrice=p.price.some(v=>v!==null);
  const ds=[{label:'評価額',data:p.equity,yAxisID:'y',borderColor:BULL,
      backgroundColor:'rgba(46,194,126,.08)',borderWidth:1.8,pointRadius:0,tension:.2,fill:true}];
  if(hasPrice) ds.push({label:'price',data:p.price,yAxisID:'y1',
      borderColor:'#5b6b7d',borderWidth:1.4,pointRadius:0,tension:.15});
  const opts={responsive:true,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:DIM,font:{family:'IBM Plex Mono'}}}},
    scales:{
      x:{ticks:{color:DIM,maxTicksLimit:8,font:{family:'IBM Plex Mono',size:10}},grid:{color:'#1a2230'}},
      y:{position:'left',ticks:{color:BULL,font:{family:'IBM Plex Mono',size:10}},grid:{color:'#161d29'}},
      y1:{position:'right',display:hasPrice,ticks:{color:'#6f7e8f',font:{family:'IBM Plex Mono',size:10}},grid:{drawOnChartArea:false}}
    }};
  if(pchart){pchart.data={labels,datasets:ds};pchart.options=opts;pchart.update();}
  else pchart=new Chart(document.getElementById('pchart'),{type:'line',data:{labels,datasets:ds},options:opts});
}

async function tryFetch(url){
  const ctrl=new AbortController(); const id=setTimeout(()=>ctrl.abort(),800);
  try{ const r=await fetch(url,{signal:ctrl.signal}); clearTimeout(id);
       if(!r.ok) throw 0; return await r.json(); }
  catch(e){ clearTimeout(id); return null; }
}

async function refresh(){
  const a=document.getElementById('asset').value.trim()||'BTC';
  let sig=null, ts=null, paper=null, mode='PREVIEW';
  // ① 静的スナップショット（GitHub Pages 用 / 同一オリジンの data.json）
  const snap=await tryFetch('./data.json');
  if(snap && snap.signal && snap.timeseries){ sig=snap.signal; ts=snap.timeseries; paper=snap.paper||null; mode='SNAPSHOT'; }
  // ② ライブAPI（dashboard.py が配信しているとき）
  if(!sig){
    const s=await tryFetch('/api/signal?asset='+encodeURIComponent(a));
    const t=await tryFetch('/api/timeseries?window=6&limit=240&asset='+encodeURIComponent(a));
    if(s && t){ sig=s; ts=t; mode='LIVE'; }
  }
  // ③ サンプル（データが無いときのプレビュー）
  if(!sig){ sig=sampleSignal(a); ts=sampleSeries(6); paper=samplePaper(); }
  document.getElementById('mode').textContent=mode;
  renderCards(sig); renderChart(ts); renderPaper(paper);
  refreshControl();
}

const CTL_LABEL={running:'稼働中',paused:'一時停止',flat:'停止(手仕舞い)'};
const CTL_COLOR={running:BULL,paused:GOLD,flat:BEAR};
let ctlLive=false;
async function refreshControl(){
  const c=await tryFetch('/api/control');     // 静的配信ではnull（操作不可）
  const stEl=document.getElementById('ctl-state');
  const note=document.getElementById('ctl-note');
  const btns=['ctl-run','ctl-pause','ctl-flat'].map(id=>document.getElementById(id));
  if(!c || !c.effective){
    ctlLive=false;
    stEl.textContent='—'; stEl.style.color=DIM;
    document.getElementById('ctl-upd').textContent='';
    note.textContent='操作にはライブ接続（dashboard.py / 自前バックエンド）が必要です。静的表示では操作できません。';
    btns.forEach(b=>{b.disabled=true; b.style.opacity=.4; b.style.outline='none';});
    return;
  }
  ctlLive=true;
  const eff=c.effective;
  stEl.textContent=CTL_LABEL[eff]||eff; stEl.style.color=CTL_COLOR[eff]||DIM;
  document.getElementById('ctl-upd').textContent=c.updated?('・更新 '+c.updated):'';
  note.textContent=c.stop_file?'※STOPファイルがあるため強制「停止(手仕舞い)」中（解除はサーバ側でSTOP削除）。':'';
  const map={running:'ctl-run',paused:'ctl-pause',flat:'ctl-flat'};
  btns.forEach(b=>{b.disabled=false; b.style.opacity=1; b.style.outline='none';});
  const act=document.getElementById(map[c.state]); if(act) act.style.outline='2px solid '+(CTL_COLOR[c.state]||GOLD);
}
async function setControl(state){
  if(!ctlLive) return;
  if(state==='flat' && !confirm('全建玉を手仕舞いして取引を停止します。よろしいですか？')) return;
  try{
    const r=await fetch('/api/control',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({state:state})});
    if(!r.ok) throw 0;
  }catch(e){ alert('操作に失敗しました（接続／権限を確認してください）'); }
  refreshControl();
}
refresh(); setInterval(refresh,30000);
</script>
</body></html>
